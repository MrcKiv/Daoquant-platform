name: daoquant-platform

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-redo-log-capacity=${MYSQL_INNODB_REDO_LOG_CAPACITY:-1G}
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-jdgp}
      MYSQL_USER: ${MYSQL_USER:-daoquant}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-daoquant123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 10m

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_NAME: ${DB_NAME:-jdgp}
      DB_USER: ${DB_USER:-daoquant}
      DB_PASSWORD: ${DB_PASSWORD:-daoquant123}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_CHARSET: ${DB_CHARSET:-utf8mb4}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-this-secret-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      DJANGO_TIME_ZONE: ${DJANGO_TIME_ZONE:-Asia/Shanghai}
      ENABLE_TRADE: ${ENABLE_TRADE:-0}
      ENABLE_TRADE_MODULE: ${ENABLE_TRADE_MODULE:-0}
      ENABLE_WHITENOISE: ${ENABLE_WHITENOISE:-1}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-0}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-Lax}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-0}
      CSRF_COOKIE_SAMESITE: ${CSRF_COOKIE_SAMESITE:-Lax}
      USE_X_FORWARDED_HOST: ${USE_X_FORWARDED_HOST:-1}
      DJANGO_AUTO_MIGRATE: ${DJANGO_AUTO_MIGRATE:-1}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/api/health/', timeout=5).read()\""]
      interval: 15s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_ENABLE_AUTO_TRADE: ${VITE_ENABLE_AUTO_TRADE:-false}
        VITE_TRADE_API_BASE_URL: ${VITE_TRADE_API_BASE_URL:-/trade-api}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
